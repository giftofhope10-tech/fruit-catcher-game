// ─── AD_ID patch (root build.gradle — earliest possible, before app subproject) ──
// Patches android/app/src/main/AndroidManifest.xml at Gradle configuration time.
// This runs even if android/app/build.gradle is regenerated by Appflow.
def adIdManifest = file("app/src/main/AndroidManifest.xml")
if (adIdManifest.exists()) {
    def adIdContent = adIdManifest.text
    if (!adIdContent.contains("com.google.android.gms.permission.AD_ID")) {
        adIdManifest.text = adIdContent.replace('</manifest>',
            '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n</manifest>')
        println "[AD_ID-patch] INJECTED (root build.gradle) → app/src/main/AndroidManifest.xml"
    } else {
        println "[AD_ID-patch] OK (root build.gradle) → app/src/main/AndroidManifest.xml"
    }
}
// ─────────────────────────────────────────────────────────────────────────────

buildscript {
    apply from: "variables.gradle"
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

defaultTasks ':app:assembleRelease'

subprojects {
    ext.kotlin_version = '1.9.10'
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "17"
        }
    }
}
