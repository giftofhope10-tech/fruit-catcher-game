apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.fruitcatcher.game"
    compileSdkVersion rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.fruitcatcher.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 28
        versionName "1.4.2"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lintOptions {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation 'com.unity3d.ads:unity-ads:4.12.1'
    implementation 'com.google.android.gms:play-services-ads-identifier:18.1.0'
    implementation 'com.google.android.play:review:2.0.1'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: "capacitor.build.gradle"

// Ensure AD_ID permission is always present in the final merged manifest.
// This runs AFTER Gradle's manifest merger, so it works even if cap sync
// or Appflow CI regenerates AndroidManifest.xml from templates.
android.applicationVariants.all { variant ->
    variant.outputs.each { output ->
        def processManifest = output.processManifestProvider.get()
        processManifest.doLast { task ->
            def manifestDir = task.manifestOutputDirectory.get().asFile
            def manifestFile = new File(manifestDir, "AndroidManifest.xml")
            if (!manifestFile.exists()) {
                manifestFile = manifestDir.listFiles()?.find { it.name == "AndroidManifest.xml" }
            }
            if (manifestFile?.exists()) {
                def content = manifestFile.text
                if (!content.contains("com.google.android.gms.permission.AD_ID")) {
                    content = content.replace(
                        '<uses-permission android:name="android.permission.INTERNET"/>',
                        '<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>'
                    )
                    manifestFile.text = content
                    println "[AD_ID-patch] Permission injected into merged manifest: ${manifestFile.path}"
                } else {
                    println "[AD_ID-patch] Permission already present in merged manifest."
                }
            }
        }
    }
}
