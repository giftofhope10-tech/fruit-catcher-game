apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.fruitcatcher.game"
    compileSdkVersion rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.fruitcatcher.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 31
        versionName "1.4.5"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lintOptions {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation 'com.unity3d.ads:unity-ads:4.12.1'
    implementation 'com.google.android.gms:play-services-ads-identifier:18.1.0'
    implementation 'com.google.android.play:review:2.0.1'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: "capacitor.build.gradle"

// ─── AD_ID permission patch ──────────────────────────────────────────────────
// Appflow's `cap sync` may regenerate AndroidManifest.xml and strip the
// AD_ID permission.  This closure scans the Gradle intermediates directory
// for every merged AndroidManifest.xml and injects the permission if missing.
// Compatible with AGP 8.x (no deprecated task properties used).

def patchAdIdInAllManifests = { File intermediatesDir ->
    if (!intermediatesDir.exists()) {
        println "[AD_ID-patch] intermediates dir not found: ${intermediatesDir}"
        return
    }
    def patched = 0
    def alreadyPresent = 0
    intermediatesDir.eachFileRecurse { f ->
        if (f.name != "AndroidManifest.xml") return
        // Only touch the merged/bundle outputs, not source manifests
        def p = f.canonicalPath
        if (!p.contains("merged_manifests") && !p.contains("bundle_manifest")) return
        def content = f.text
        if (!content.contains("com.google.android.gms.permission.AD_ID")) {
            f.text = content.replace(
                '</manifest>',
                '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n</manifest>'
            )
            println "[AD_ID-patch] INJECTED  → ${p}"
            patched++
        } else {
            println "[AD_ID-patch] OK        → ${p}"
            alreadyPresent++
        }
    }
    println "[AD_ID-patch] Done — injected: ${patched}, already present: ${alreadyPresent}"
}

afterEvaluate {
    android.applicationVariants.all { variant ->
        def cap = variant.name.capitalize()
        // Hook every known manifest task name for both APK and AAB paths.
        // AGP 8.x may use one or several of these depending on build type.
        ["process${cap}Manifest",
         "process${cap}MainManifestForBundle",
         "process${cap}ManifestForPackage"].each { taskName ->
            if (tasks.findByName(taskName)) {
                tasks.named(taskName).configure { task ->
                    task.doLast { patchAdIdInAllManifests(new File("${buildDir}/intermediates")) }
                }
            }
        }
    }
    // Fallback: also run patch just before the final bundle/assemble step
    ["bundleRelease", "assembleRelease"].each { taskName ->
        if (tasks.findByName(taskName)) {
            tasks.named(taskName).configure { task ->
                task.doFirst { patchAdIdInAllManifests(new File("${buildDir}/intermediates")) }
            }
        }
    }
}
