apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.fruitcatcher.game"
    compileSdkVersion rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.fruitcatcher.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 44
        versionName "1.6.7"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lintOptions {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':ad-id-compat')
    implementation 'com.unity3d.ads:unity-ads:4.12.1'
    implementation 'com.google.android.gms:play-services-ads-identifier:18.1.0'
    implementation 'com.google.android.play:review:2.0.1'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: "capacitor.build.gradle"

// ─── AD_ID permission patch ──────────────────────────────────────────────────
// The critical task is processApplicationManifestReleaseForBundle — it runs
// AFTER processReleaseManifest and creates the bundle_manifest that
// packageReleaseBundle actually reads when building the .aab file.
// The old regex /process.*Manifest/ used Groovy ==~ full-string matching and
// did NOT match processApplicationManifestReleaseForBundle because that task
// name ends with ForBundle, not Manifest. Fixed to /process.*Manifest.*/.

def adIdPerm = '    <uses-permission android:name="com.google.android.gms.permission.AD_ID" />'

// ── PHASE 1: configuration-time source patch ──────────────────────────────────
["src/main/AndroidManifest.xml",
 "src/release/AndroidManifest.xml"].each { rel ->
    def f = file(rel)
    if (f.exists()) {
        def c = f.text
        if (!c.contains("com.google.android.gms.permission.AD_ID")) {
            f.text = c.replace('</manifest>', "${adIdPerm}\n</manifest>")
            println "[AD_ID-patch] INJECTED (config-time) → ${rel}"
        } else {
            println "[AD_ID-patch] OK (config-time) → ${rel}"
        }
    }
}

// ── PHASE 2: patch every manifest-related intermediate after it is written ────
// Regex uses .* at the END so it matches both:
//   - processReleaseManifest          (ends with Manifest)
//   - processApplicationManifestReleaseForBundle  (has Manifest in the middle)
// This ensures bundle_manifest/release/AndroidManifest.xml is patched BEFORE
// packageReleaseBundle reads it.
afterEvaluate {
    def patchMerged = { String label ->
        def intermediates = new File(buildDir, "intermediates")
        if (!intermediates.exists()) return
        fileTree(intermediates) { include "**/*.xml" }.files
            .findAll { it.name == "AndroidManifest.xml" }
            .each { mf ->
                def c = mf.text
                if (!c.contains("com.google.android.gms.permission.AD_ID")) {
                    mf.text = c.replace('</manifest>', "${adIdPerm}\n</manifest>")
                    println "[AD_ID-patch] INJECTED (${label}) → ${mf.path}"
                } else {
                    println "[AD_ID-patch] OK (${label}) → ${mf.path}"
                }
            }
    }

    // Match ALL manifest tasks including processApplicationManifestReleaseForBundle
    tasks.matching { it.name ==~ /process.*Manifest.*/ }.configureEach { task ->
        task.outputs.upToDateWhen { false }
        task.doLast { patchMerged(task.name) }
    }
    tasks.matching { it.name ==~ /(bundle|assemble).*Release/ }.configureEach { task ->
        task.outputs.upToDateWhen { false }
        task.doFirst { patchMerged(task.name + ".doFirst") }
    }

    // Direct hook on packageReleaseBundle — this runs IMMEDIATELY before the
    // task that seals the .aab, ensuring bundle_manifest has AD_ID at the
    // exact moment packageReleaseBundle reads it.
    tasks.matching { it.name == "packageReleaseBundle" }.configureEach { task ->
        task.outputs.upToDateWhen { false }
        task.doFirst {
            def bundleManifest = new File(buildDir,
                "intermediates/bundle_manifest/release/AndroidManifest.xml")
            if (bundleManifest.exists()) {
                def c = bundleManifest.text
                if (!c.contains("com.google.android.gms.permission.AD_ID")) {
                    bundleManifest.text = c.replace('</manifest>', "${adIdPerm}\n</manifest>")
                    println "[AD_ID-patch] INJECTED (packageReleaseBundle.doFirst) → ${bundleManifest.path}"
                } else {
                    println "[AD_ID-patch] OK (packageReleaseBundle.doFirst) → ${bundleManifest.path}"
                }
            } else {
                println "[AD_ID-patch] WARN (packageReleaseBundle.doFirst) → bundle_manifest not found"
            }
        }
    }
}
