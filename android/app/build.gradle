apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.fruitcatcher.game"
    compileSdkVersion rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.fruitcatcher.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 34
        versionName "1.4.8"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lintOptions {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation 'com.unity3d.ads:unity-ads:4.12.1'
    implementation 'com.google.android.gms:play-services-ads-identifier:18.1.0'
    implementation 'com.google.android.play:review:2.0.1'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: "capacitor.build.gradle"

// ─── AD_ID permission patch ──────────────────────────────────────────────────
// Appflow's `cap sync` regenerates src/main/AndroidManifest.xml and strips
// the AD_ID permission.  We patch BOTH source manifests inside afterEvaluate
// so the real preBuild task (AGP 8.x lazy task) is correctly hooked BEFORE
// Gradle's manifest merger reads any source file.
// NOTE: preBuild.doFirst at top-level creates a dummy task in AGP 8.x —
//       tasks.named() inside afterEvaluate is the only correct API.

afterEvaluate {
    tasks.named("preBuild").configure { task ->
        task.doFirst {
            def adIdLine = '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>'
            // Patch both main and release-overlay source manifests
            ["src/main/AndroidManifest.xml",
             "src/release/AndroidManifest.xml"].each { relPath ->
                def f = project.file(relPath)
                if (!f.exists()) {
                    println "[AD_ID-patch] not found (skip): ${relPath}"
                    return
                }
                def content = f.text
                if (!content.contains("com.google.android.gms.permission.AD_ID")) {
                    f.text = content.replace('</manifest>',
                            "${adIdLine}\n</manifest>")
                    println "[AD_ID-patch] INJECTED → ${relPath}"
                } else {
                    println "[AD_ID-patch] OK       → ${relPath}"
                }
            }
        }
    }
}
